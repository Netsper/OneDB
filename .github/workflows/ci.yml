name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_sqlite, pdo_mysql, pdo_pgsql

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Backend smoke tests
        run: php tests/backend/smoke.php

      - name: Frontend unit and integration tests
        run: npm --prefix frontend test

      - name: Build frontend bundle
        run: ONEDB_EMBEDDED=1 npm --prefix frontend run build

      - name: Package release file
        run: node build/pack-release.mjs

      - name: Validate release PHP syntax
        run: php -l release/OneDB.php
